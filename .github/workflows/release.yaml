run-name: Release ${{ inputs.version }}
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true

permissions: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxdo-dev

      - run: cargo build --release

      - name: Package
        run: |
          tar czf midimap-${{ inputs.version }}-${{ matrix.target }}.tar.gz \
            -C target/release midimap

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: midimap-${{ matrix.target }}
          path: midimap-${{ inputs.version }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - run: |
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --generate-notes \
            midimap-*.tar.gz
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
