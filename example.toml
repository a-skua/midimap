# Optional: match MIDI port by name substring
# Omit to use the first available port.
# port = "Arturia"

# Note On mappings — note names use LilyPond-style spelling
# (sharp = "is", flat = "es") with scientific octave numbers
# (c4 = middle C = MIDI 60).
[[map]]
note = "c4"
keys = "cmd+c"

[[map]]
note = "cis4"      # C#4
keys = "cmd+v"

[[map]]
note = "d4"
keys = "cmd+z"

[[map]]
note = "e4"
keys = "f5"

# CC mapping — sustain pedal (CC 64) triggers space
[[map]]
cc = 64
min_value = 64     # pedal pressed (value >= 64)
keys = "space"

# Channel-specific mapping (channel 2 only)
# [[map]]
# note = "c4"
# channel = 2
# keys = "cmd+shift+c"
